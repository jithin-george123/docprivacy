name: CI/CD - Build & Deploy to AWS EC2 (Nginx + Docker)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        # Requires Docker Hub username and access token set in repository secrets
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push App Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Use your Docker Hub username here dynamically
          tags: ${{ secrets.DOCKER_USERNAME }}/document-privacy:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Removing old files..."
            rm -rf document-privacy-masking
            mkdir -p document-privacy-masking/nginx
            
            echo "Downloading new docker-compose and nginx config..."
            curl -o document-privacy-masking/docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
            curl -o document-privacy-masking/nginx/nginx.conf https://raw.githubusercontent.com/${{ github.repository }}/main/nginx/nginx.conf
            
            cd document-privacy-masking

            # Replace local build with Docker Hub image
            sed -i 's/build: ./image: ${{ secrets.DOCKER_USERNAME }}\/document-privacy:latest/' docker-compose.yml

            echo "Pulling latest docker image..."
            sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            sudo docker-compose pull
            
            echo "Starting containers..."
            sudo docker-compose up -d
